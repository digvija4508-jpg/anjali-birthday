<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Memories Album</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=Shadows+Into+Light&display=swap" rel="stylesheet">
</head>
<body>
    
    <div id="preloader">
        <div class="loader-content">
            <h1 class="bounce">Gathering Memories...</h1>
            <p id="loading-progress">0 / 311 downloaded</p>
        </div>
    </div>

    <div class="header">
        <h1>All 311 Memories</h1>
        <p>A zoomed-out view of every beautiful moment.</p>
    </div>

    <div class="mosaic-container" id="mosaic-grid">
        <!-- Media will be injected here -->
    </div>

    <script src="script.js"></script>
</body>
</html>
